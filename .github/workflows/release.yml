name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish reviewed tarball
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          cache: npm
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.13.0 --ignore-scripts
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: npm run release:check
        env:
          RELEASE_TAG: ${{ github.ref_name }}
      - run: npm pack --json > package-pack.json
      - run: node scripts/hash-pack.mjs package-pack.json package.sha256
      - run: npm sbom --sbom-format cyclonedx > sbom.cdx.json
      - name: Publish reviewed artifact without moving the wrong dist-tag
        run: >-
          npm publish "$(node -p "require('./package-pack.json')[0].filename")"
          --access public
          --provenance
          --tag "$(node scripts/release-dist-tag.mjs "$(node -p "require('./package.json').version")")"
      - run: mkdir registry
      - run: npm pack "newtondb@$(node -p "require('./package.json').version")" --pack-destination registry --json > registry/pack.json
      - run: node scripts/verify-published.mjs package-pack.json registry/pack.json
      - run: node scripts/package-smoke.mjs "registry/$(node -p "require('./registry/pack.json')[0].filename")"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          if-no-files-found: error
          name: release-evidence-${{ github.ref_name }}
          path: |
            *.tgz
            package-pack.json
            package.sha256
            sbom.cdx.json
            registry/

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [22.13.0, 24.x]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: ${{ matrix.node }}
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: npm audit --omit=dev --audit-level=high

  package-smoke:
    name: Packed ESM consumer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24.x
      - run: npm ci --ignore-scripts
      - run: npm run test:package

  typescript:
    name: TypeScript ${{ matrix.typescript }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        typescript: [6.0.2, 6.0.3]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24.x
      - run: npm ci --ignore-scripts
      - run: npm install --no-save --package-lock=false typescript@${{ matrix.typescript }}
      - run: npm run typecheck
      - run: npm run build
